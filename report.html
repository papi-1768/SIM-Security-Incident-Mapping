<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Incident</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form">

<h2>Report Security Incident</h2>

<form onsubmit="return validateForm()">

<label>Incident Type</label>

<select required>

<option value="">Select Incident</option>

<option>Theft</option>

<option>Stabbing</option>

<option>Assault</option>

<option>Rape</option>

<option>Cultism</option>

<option>Kidnapping</option>

<option>Drug Abuse</option>

<option>Vandalism</option>

</select>

<label>Location</label>

<input type="text" placeholder="Enter incident location" required>

<label>Date</label>

<input type="date" required>

<label>Description</label>

<textarea rows="6" placeholder="Describe what happened..." required></textarea>

<label>Upload Evidence (Optional)</label>

<input type="file">

<button type="submit">Submit Report</button>

</form>

</div>
<script scr="script.js"></script>
</body>
</html>
